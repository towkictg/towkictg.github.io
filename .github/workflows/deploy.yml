steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for deep security scanning

      # --- SECURITY CHECK 1: SECRET SCANNING ---
      - name: Secret Scan (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      # --- SECURITY CHECK 2: LINTING & SYNTX CHECK ---
      - name: HTML Hint (SAST)
        run: |
          npm install -g htmlhint
          htmlhint "**/*.html"

      # --- DEPLOYMENT (Only runs if security checks pass) ---
      - name: Deploy to AWS via SSH
        if: success() 
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_AWS_RESUME }}
          port: 22
          script: |
            cd /home/ubuntu/towkictg.github.io
            git pull origin main
            sudo cp -r /home/ubuntu/towkictg.github.io/* /var/www/html/
            sudo chown -R www-data:www-data /var/www/html/
            sudo chmod -R 755 /var/www/html/